<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">AIppocampus architecture layers</title>
  <desc id="desc">A layered diagram showing source, clean source, registry, hooks, semantic routes, and public access surfaces.</desc>
  <rect width="920" height="620" fill="#f8f3ea"/>
  <g fill="none" stroke="#111827" stroke-width="2">
    <rect x="72" y="64" width="776" height="76" rx="8" fill="#efe1cc"/>
    <rect x="72" y="160" width="776" height="76" rx="8" fill="#dce6dc"/>
    <rect x="72" y="256" width="776" height="76" rx="8" fill="#dbe8ec"/>
    <rect x="72" y="352" width="776" height="76" rx="8" fill="#efe1cc"/>
    <rect x="72" y="448" width="776" height="76" rx="8" fill="#dfc8a8"/>
  </g>
  <g font-family="Inter, Segoe UI, sans-serif" fill="#111827">
    <text x="100" y="98" font-size="20" font-weight="700">1. Conversation source</text>
    <text x="100" y="122" font-size="15">Provider-owned transcripts stay as the audit path.</text>
    <text x="100" y="194" font-size="20" font-weight="700">2. Clean source</text>
    <text x="100" y="218" font-size="15">Visible user turns and final answers become the daily recall surface.</text>
    <text x="100" y="290" font-size="20" font-weight="700">3. Registry and indexes</text>
    <text x="100" y="314" font-size="15">Search finds snippets and route refs without turning scores into truth.</text>
    <text x="100" y="386" font-size="20" font-weight="700">4. Hooks and recall routes</text>
    <text x="100" y="410" font-size="15">Ambient prompts and progressive recall surface the smallest useful route.</text>
    <text x="100" y="482" font-size="20" font-weight="700">5. CLI, MCP, sync, and public API</text>
    <text x="100" y="506" font-size="15">Agents use public surfaces and reopen source before strong claims.</text>
  </g>
  <g fill="#123a59">
    <path d="M460 140v20" stroke="#123a59" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M460 236v20" stroke="#123a59" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M460 332v20" stroke="#123a59" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M460 428v20" stroke="#123a59" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#123a59"/>
    </marker>
  </defs>
  <text x="72" y="574" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#334155">Rule: source is the ground; summaries, scents, and scores are navigation.</text>
</svg>
